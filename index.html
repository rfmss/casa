<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Jardim Central — Lote 10×20m</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a18; overflow:hidden; font-family:'Courier New',monospace; }
  #c { display:block; width:100vw; height:100vh; }

  #ui {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:16px 20px; pointer-events:none; z-index:10;
  }

  #title { color:#f5f0e8; pointer-events:none; }
  #title h1 { font-size:1rem; letter-spacing:0.15em; text-transform:uppercase; }
  #title p  { font-size:0.65rem; color:#a09880; margin-top:3px; letter-spacing:0.1em; }

  #controls {
    display:flex; flex-direction:column; gap:8px; pointer-events:all;
    align-items:flex-end;
  }
  .btn-group { display:flex; gap:6px; }
  button {
    background:#2a2a24cc; border:1px solid #605a48;
    color:#f5f0e8; font-family:'Courier New',monospace;
    font-size:0.65rem; letter-spacing:0.08em; text-transform:uppercase;
    padding:7px 12px; cursor:pointer; transition:all 0.2s;
    backdrop-filter:blur(6px);
  }
  button:hover { background:#4a4438cc; border-color:#b05a2f; }
  button.active { background:#b05a2f; border-color:#d07a4f; color:#fff; }

  #hint {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    color:#807868; font-size:0.62rem; letter-spacing:0.1em;
    text-transform:uppercase; text-align:center;
    pointer-events:none; z-index:10;
  }
  #room-label {
    position:fixed; bottom:44px; left:50%; transform:translateX(-50%);
    color:#f5f0e8; font-size:0.75rem; letter-spacing:0.12em;
    text-transform:uppercase; background:#1a1a18cc;
    padding:6px 16px; backdrop-filter:blur(4px);
    border:1px solid #4a4438; opacity:0;
    transition:opacity 0.4s; pointer-events:none; z-index:10;
  }
  #room-label.show { opacity:1; }

  #legend {
    position:fixed; bottom:16px; right:20px;
    color:#a09878; font-size:0.58rem; letter-spacing:0.08em;
    text-transform:uppercase; pointer-events:none; z-index:10;
    line-height:1.6;
  }
  #legend span { display:block; }
  #legend .n { color:#88b8d8; }
  #legend .s { color:#e09050; }
  #legend .arrow { color:#f0c040; font-size:0.7rem; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="controls">
    <button id="btn-tour" onclick="startTour()">▶ Tour Virtual</button>
  </div>
</div>

<div id="room-label"></div>
<div id="hint">Arrastar=girar · Scroll=zoom · Clique=olhar</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════
// ORIENTAÇÃO:
//   Norte = -Z (frente/fachada, quartos)
//   Sul   = +Z (fundos, piscina, sol tarde)
//   Leste = +X (sol manhã)
//   Oeste = -X (sol tarde)
//
// PLANTA QUADRADA ~10×10m útil, lote 10×20m
//
//  ┌──────────────────────────────────┐  NORTE (-Z)
//  │  Suíte     │ J.Inverno │ Qto 2  │
//  │  (N-Leste) │  CENTRO   │ (N-Oste│
//  │────────────┤           ├────────│
//  │  Sala/Sta  │           │ Cozinha│
//  │  (S-Leste) │           │ (S-Oste│
//  └────────────┴───────────┴────────┘  SUL (+Z)
//  Piscina no canto SW (Sul+Oeste) — mais quente tarde
//  Varanda na fachada Norte
//
// Jardim de Inverno: 3.5×3.5m no centro geométrico
// Tudo acessa o jardim. Vidro lateral = parede, chuva fina entra, ralo central.
// ══════════════════════════════════════════

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 130);

const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 200);

// ─────────────────────────────────────────
// TEXTURAS PROCEDURAIS
// ─────────────────────────────────────────
function makeCanvas(w,h,fn){
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  fn(cv.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

const grassTex = makeCanvas(256,256,(ctx,w,h)=>{
  ctx.fillStyle='#5a8a3c'; ctx.fillRect(0,0,w,h);
  for(let i=0;i<500;i++){
    ctx.strokeStyle=`hsl(${95+Math.random()*30},${45+Math.random()*25}%,${28+Math.random()*22}%)`;
    ctx.lineWidth=0.8;
    ctx.beginPath();
    const x=Math.random()*w, y=Math.random()*h;
    ctx.moveTo(x,y); ctx.lineTo(x+(Math.random()-0.5)*3,y-5+Math.random()*3);
    ctx.stroke();
  }
});
grassTex.repeat.set(12,24);

const tileTex = makeCanvas(256,256,(ctx,w,h)=>{
  ctx.fillStyle='#ede5d8'; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='#cfc5b4'; ctx.lineWidth=2;
  for(let x=0;x<=w;x+=64){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for(let y=0;y<=h;y+=64){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
  // grão sutil
  for(let i=0;i<200;i++){
    ctx.fillStyle=`rgba(${100+Math.random()*80},${90+Math.random()*80},${70+Math.random()*60},0.08)`;
    ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*4+1,Math.random()*4+1);
  }
});
tileTex.repeat.set(5,5);

const jardimTileTex = makeCanvas(256,256,(ctx,w,h)=>{
  // pedra natural irregular para o jardim
  ctx.fillStyle='#8a9a7a'; ctx.fillRect(0,0,w,h);
  for(let i=0;i<120;i++){
    const gx=Math.random()*w, gy=Math.random()*h;
    const gr=8+Math.random()*18;
    ctx.fillStyle=`hsl(${80+Math.random()*40},${20+Math.random()*20}%,${40+Math.random()*20}%)`;
    ctx.beginPath();
    ctx.ellipse(gx,gy,gr,gr*0.7,Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1;
    ctx.stroke();
  }
});
jardimTileTex.repeat.set(3,3);

const wallTex = makeCanvas(512,512,(ctx,w,h)=>{
  ctx.fillStyle='#f2ece0'; ctx.fillRect(0,0,w,h);
  for(let i=0;i<500;i++){
    ctx.fillStyle=`rgba(${150+Math.random()*50},${140+Math.random()*50},${120+Math.random()*40},0.1)`;
    ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*8+1,Math.random()*8+1);
  }
});
wallTex.repeat.set(2,1);

const concreteTex = makeCanvas(256,256,(ctx,w,h)=>{
  ctx.fillStyle='#d8d0c4'; ctx.fillRect(0,0,w,h);
  for(let i=0;i<300;i++){
    ctx.fillStyle=`rgba(${100+Math.random()*60},${90+Math.random()*60},${80+Math.random()*50},0.12)`;
    ctx.beginPath();
    ctx.arc(Math.random()*w,Math.random()*h,Math.random()*5+1,0,Math.PI*2);
    ctx.fill();
  }
});
concreteTex.repeat.set(3,3);

const woodTex = makeCanvas(512,128,(ctx,w,h)=>{
  for(let i=0;i<16;i++){
    const hue=22+Math.random()*12, l=38+Math.random()*18;
    ctx.fillStyle=`hsl(${hue},58%,${l}%)`;
    ctx.fillRect(0,i*8,w,8);
    ctx.strokeStyle=`hsl(${hue},48%,${l-14}%)`;
    ctx.lineWidth=0.6;
    ctx.beginPath(); ctx.moveTo(0,i*8+8); ctx.lineTo(w,i*8+8); ctx.stroke();
  }
  for(let i=0;i<30;i++){
    ctx.strokeStyle='rgba(0,0,0,0.05)'; ctx.lineWidth=Math.random()*1.5;
    const x=Math.random()*w;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+(Math.random()*10-5),h); ctx.stroke();
  }
});
woodTex.repeat.set(6,2);

const waterTex = makeCanvas(512,512,(ctx,w,h)=>{
  const grad=ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,'#3a8fbc'); grad.addColorStop(1,'#5ab8e8');
  ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5;
  for(let y=0;y<h;y+=18){
    ctx.beginPath();
    for(let x=0;x<w;x+=2){
      const wave=Math.sin((x*0.04)+(y*0.08))*3;
      x===0?ctx.moveTo(x,y+wave):ctx.lineTo(x,y+wave);
    }
    ctx.stroke();
  }
});
waterTex.repeat.set(3,3);

const roofTex = makeCanvas(256,128,(ctx,w,h)=>{
  for(let i=0;i<32;i++){
    ctx.fillStyle=`hsl(200,${15+Math.random()*10}%,${55+Math.random()*15}%)`;
    ctx.fillRect(0,i*4,w,4);
  }
  for(let i=0;i<200;i++){
    ctx.fillStyle='rgba(0,0,0,0.05)';
    ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*6,Math.random()*2);
  }
});
roofTex.repeat.set(6,2);

// ─────────────────────────────────────────
// MATERIAIS
// ─────────────────────────────────────────
const M = {
  ground:   new THREE.MeshLambertMaterial({map:grassTex}),
  wall:     new THREE.MeshLambertMaterial({map:wallTex}),
  wallInt:  new THREE.MeshLambertMaterial({map:wallTex, color:0xf8f2e8}),
  floor:    new THREE.MeshLambertMaterial({map:tileTex}),
  jardim:   new THREE.MeshLambertMaterial({map:jardimTileTex}),
  concrete: new THREE.MeshLambertMaterial({map:concreteTex}),
  wood:     new THREE.MeshLambertMaterial({map:woodTex}),
  water:    new THREE.MeshLambertMaterial({map:waterTex, transparent:true, opacity:0.9}),
  // Vidro jardim: moderno, como parede, cor neutra
  glass:    new THREE.MeshPhysicalMaterial({color:0xa8d8e8, transparent:true, opacity:0.28, roughness:0.04, metalness:0.15, side:THREE.DoubleSide}),
  glassRoof:new THREE.MeshPhysicalMaterial({color:0xd0eeff, transparent:true, opacity:0.22, roughness:0.02, metalness:0.1, side:THREE.DoubleSide}),
  roofMat:  new THREE.MeshLambertMaterial({map:roofTex, color:0xb8c8d0}),
  roofFlat: new THREE.MeshLambertMaterial({color:0xc8ccc8}),
  frame:    new THREE.MeshLambertMaterial({color:0x606858}),
  dark:     new THREE.MeshLambertMaterial({color:0x2a2820}),
  green:    new THREE.MeshLambertMaterial({color:0x4a9040}),
  darkgreen:new THREE.MeshLambertMaterial({color:0x2a5a18}),
  trunk:    new THREE.MeshLambertMaterial({color:0x6a4020}),
  yellow:   new THREE.MeshLambertMaterial({color:0xe8c860}),
  white:    new THREE.MeshLambertMaterial({color:0xfdfaf4}),
  blue:     new THREE.MeshLambertMaterial({color:0x88bbdd}),
  pool:     new THREE.MeshLambertMaterial({color:0x4080a0}),
  poolWall: new THREE.MeshLambertMaterial({color:0xb8c8d0}),
  stone:    new THREE.MeshLambertMaterial({color:0xc0b8a8}),
  metal:    new THREE.MeshLambertMaterial({color:0x888888}),
  tile:     new THREE.MeshLambertMaterial({color:0xc8d8e0}),
  mirror:   new THREE.MeshPhysicalMaterial({color:0xd8e8f0,transparent:true,opacity:0.4,roughness:0.02,metalness:0.3}),
  chrome:   new THREE.MeshPhysicalMaterial({color:0xe0e0e0,transparent:false,roughness:0.1,metalness:0.9}),
  fabric:   new THREE.MeshLambertMaterial({color:0xa09080}),
  leather:  new THREE.MeshLambertMaterial({color:0x6a5040}),
  cushion:  new THREE.MeshLambertMaterial({color:0xb8a898}),
  bedFrame: new THREE.MeshLambertMaterial({color:0x8a7060}),
  mattress: new THREE.MeshLambertMaterial({color:0xf5f0e8}),
  blanket:  new THREE.MeshLambertMaterial({color:0x7a9ab0}),
  pillow:   new THREE.MeshLambertMaterial({color:0xf0ebe0}),
  lamp:     new THREE.MeshLambertMaterial({color:0xf0e0c0}),
  shade:    new THREE.MeshLambertMaterial({color:0xf8f0e0,transparent:true,opacity:0.85}),
  plantPot: new THREE.MeshLambertMaterial({color:0xb09070}),
  leaf:     new THREE.MeshLambertMaterial({color:0x5a9a40}),
  leafDark: new THREE.MeshLambertMaterial({color:0x3a7a20}),
};

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function box(w,h,d,mat,x,y,z,grp){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
  (grp||scene).add(m); return m;
}
function cyl(rt,rb,h,seg,mat,x,y,z,grp){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z); m.castShadow=true; (grp||scene).add(m); return m;
}
function sph(r,mat,x,y,z,grp){
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,12,8),mat);
  m.position.set(x,y,z); m.castShadow=true; (grp||scene).add(m); return m;
}

// ─────────────────────────────────────────
// CHÃO / LOTE
// ─────────────────────────────────────────
// Lote: 10m (X) × 20m (Z). Casa: 10×10m. Recuo frente 2m, fundos 8m.
// Casa ocupa X: -5..+5, Z: -3..+7  (Norte=-Z, Sul=+Z)
// Centro geométrico da casa: X=0, Z=+2

const ground = new THREE.Mesh(new THREE.PlaneGeometry(80,100), M.ground);
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

// Calçada (Norte, frente)
box(12,0.06,3, M.concrete, 0,0.03,-6);

// ─────────────────────────────────────────
// DIMENSÕES BASE
// ─────────────────────────────────────────
const wt  = 0.20;   // espessura parede
const wh  = 2.80;   // altura parede
const fh  = 0.10;   // espessura piso
const hw  = 5.0;    // meia-largura X
const hd  = 5.0;    // meia-profundidade Z (da casa)
const cx  = 0;      // centro X
const cz  = 2.0;    // centro Z da casa (frente em z=-3, fundos z=+7)

// Jardim de Inverno: 3.6×3.6m no centro
// JZ: cz-1.8 a cz+1.8 = 0.2..3.8
// JX: -1.8 a +1.8
const jw  = 3.6;    // largura jardim
const jd  = 3.6;    // profundidade jardim
const jx  = 0;      // centro X jardim
const jz  = cz;     // centro Z jardim = centro casa
const jhw = jw/2;   // 1.8
const jhd = jd/2;   // 1.8

// ─────────────────────────────────────────
// PISOS
// ─────────────────────────────────────────
// Piso geral interno (menos área do jardim)
// 4 quadrantes ao redor do jardim
// NE (Suíte): x=0..5, z=-3..0.2
box(4.8, fh, 3.0, M.floor, 2.6, fh/2, -1.5);
// NO (Qto2): x=-5..0, z=-3..0.2
box(4.8, fh, 3.0, M.floor, -2.6, fh/2, -1.5);
// SE (Cozinha+área serv): x=0..5, z=3.8..7
box(4.8, fh, 3.0, M.floor, 2.6, fh/2, 5.4);
// SO (Sala+estar): x=-5..0, z=3.8..7
box(4.8, fh, 3.0, M.floor, -2.6, fh/2, 5.4);
// Faixas de circulação entre quadrantes
// Norte-Sul à Leste do jardim: x=1.8..5, z=0.2..3.8
box(3.4, fh, 3.6, M.floor, 3.3, fh/2, 2.0);
// Norte-Sul à Oeste do jardim: x=-5..-1.8, z=0.2..3.8
box(3.4, fh, 3.6, M.floor, -3.3, fh/2, 2.0);

// Piso jardim de inverno (pedra natural)
box(jw, fh*1.2, jd, M.jardim, jx, fh*0.6, jz);

// Varanda (frente, Norte)
box(10, fh*0.8, 2.0, M.concrete, 0, fh*0.4, -4.0);

// ─────────────────────────────────────────
// GRUPOS CONTROLÁVEIS
// ─────────────────────────────────────────
const wallsGroup = new THREE.Group(); scene.add(wallsGroup);
const roofGroup  = new THREE.Group(); scene.add(roofGroup);

function wb(w,h,d,mat,x,y,z){ return box(w,h,d,mat,x,y,z,wallsGroup); }
function rb(w,h,d,mat,x,y,z){ return box(w,h,d,mat,x,y,z,roofGroup); }

// Função parede com vão de porta
function wallDoor(axis, len, h, mat, px, py, pz, dc, dw=0.9){
  const half=len/2;
  const d1 = (dc-half)+(dw/2);
  const d2 = (half-dc)-(dw/2);
  const c1 = -half+d1/2;
  const c2 = dc+dw/2+d2/2;
  if(axis==='x'){
    if(d1>0.05) wb(d1,h,wt,mat, px+c1, py, pz);
    if(d2>0.05) wb(d2,h,wt,mat, px+c2, py, pz);
    wb(dw+0.04,0.2,wt,mat, px+dc, py+(h-0.1), pz);
  } else {
    if(d1>0.05) wb(wt,h,d1,mat, px, py, pz+c1);
    if(d2>0.05) wb(wt,h,d2,mat, px, py, pz+c2);
    wb(wt,0.2,dw+0.04,mat, px, py+(h-0.1), pz+dc);
  }
}

// ═══════════════════════════════════════
// PAREDES EXTERNAS
// ═══════════════════════════════════════
// Fachada Norte (z=-3): com porta central e aberturas de ventilação
wallDoor('x', 10, wh, M.wall, 0, wh/2, -3.0, 0, 1.1);
// Janela ventilação suíte (NE, z=-3): alto, pega brisa Norte
wb(0.06,0.8,1.6, M.glass, hw-0.03, 1.8, -1.5);
// Janela ventilação qto2 (NO, z=-3)
wb(0.06,0.8,1.6, M.glass, -hw+0.03, 1.8, -1.5);

// Parede Sul (z=+7): cozinha fundos, porta serviço
wallDoor('x', 10, wh, M.wall, 0, wh/2, 7.0, -2.5, 0.9);
// Abertura cozinha Sul (ventilação cruzada)
wb(0.06,0.8,1.6, M.glass, hw-0.03, 1.8, 5.5);

// Parede Leste (x=+5): suíte + cozinha, fechada (sol tarde não bate quartos)
// z=-3 a +7 (10m)
wb(wt,wh,10, M.wall, hw-wt/2, wh/2, 2.0);
// Janela leste cozinha (sol manhã — ok para cozinha)
wb(1.6,0.06,0.8, M.glass, hw-0.03, 1.8, 5.5);

// Parede Oeste (x=-5): qto2 + sala — recebe sol da tarde, mas quartos protegidos pelo jardim
wb(wt,wh,10, M.wall, -hw+wt/2, wh/2, 2.0);
// Janela sala Oeste (ventilação cruzada + estar — ok para sala ver pôr do sol)
wb(1.6,0.06,0.8, M.glass, -hw+0.03, 1.6, 5.0);

// ═══════════════════════════════════════
// DIVISÓRIAS INTERNAS
// ═══════════════════════════════════════
// Parede Norte do jardim (entre varanda/corredor Norte e jardim)
// x: -1.8..+1.8, z=-3+jhd = z=0.2 → separação quartos do jardim
// Abertura central (passagem para jardim — 1.4m de vão)
wallDoor('x', jw, wh, M.wallInt, jx, wh/2, jz-jhd, 0, 1.4);

// Parede Sul do jardim (entre jardim e sala/cozinha)
wallDoor('x', jw, wh, M.wallInt, jx, wh/2, jz+jhd, 0, 1.4);

// Parede Leste do jardim (entre jardim e corredor Leste)
wallDoor('z', jd, wh, M.wallInt, jx+jhw, wh/2, jz, 0, 1.0);

// Parede Oeste do jardim (entre jardim e corredor Oeste)
wallDoor('z', jd, wh, M.wallInt, jx-jhw, wh/2, jz, 0, 1.0);

// Divisória Suíte | Cozinha Leste (z=3.8, x=1.8..5)
wallDoor('x', 3.4, wh, M.wallInt, 3.3, wh/2, jz+jhd, 0, 0);  // sem vão (só parede)
wb(3.4, wh, wt, M.wallInt, 3.3, wh/2, jz+jhd);

// Divisória Qto2 | Sala Oeste (z=3.8, x=-5..-1.8)
wb(3.4, wh, wt, M.wallInt, -3.3, wh/2, jz+jhd);

// Divisória Suíte | Qto2 ao Norte (z=0.2, x externo): já feito pela parede Norte jardim
// Estender divisória Norte dos quartos (z=0.2, x=1.8..5 e x=-5..-1.8)
wb(3.4, wh, wt, M.wallInt, 3.3, wh/2, jz-jhd);   // NE - parede entre varanda e suíte
wb(3.4, wh, wt, M.wallInt, -3.3, wh/2, jz-jhd);   // NO - parede entre varanda e qto2

// Divisória Suíte | Banheiro (suíte ocupa NE: x=1.8..5, z=-3..0.2)
// Banheiro no canto NE (x=3.5..5, z=-3..-1.0)
wb(wt, wh, 2.0, M.wallInt, 3.5, wh/2, -2.0);       // Parede banheiro (Z)
wb(1.6, wh, wt, M.wallInt, 4.3, wh/2, -1.0);        // Parede banheiro (X) com porta impl.

function setTime(t){
  const configs={
    // Sol nasce Leste (+X), manhã vindo de +X frente
    morning:  {pos:[35,18,-20], color:0xffe8b0, int:1.5, sky:0x87CEEB, fog:0x87CEEB},
    noon:     {pos:[0,40,0],    color:0xffffff,  int:1.9, sky:0x5599dd, fog:0x6aadee},
    // Sol da tarde: Oeste (-X) + um pouco Sul (+Z) — bate na piscina SW, poupa quartos Norte
    afternoon:{pos:[-35,14,25], color:0xffaa50,  int:1.3, sky:0xe07040, fog:0xd08050},
  };
  const cfg=configs[t];
  sun.position.set(...cfg.pos); sun.color.setHex(cfg.color); sun.intensity=cfg.int;
  scene.background=new THREE.Color(cfg.sky);
  scene.fog.color.setHex(cfg.fog);
}

// CÂMERA ORBITAL
// ─────────────────────────────────────────
let mode='ext';
let extTheta=0.55, extPhi=0.85, extRadius=30;
const extTarget=new THREE.Vector3(0,1.5,2.0);

camera.position.set(
  extTarget.x+extRadius*Math.sin(extTheta)*Math.cos(extPhi),
  extTarget.y+extRadius*Math.sin(extPhi),
  extTarget.z+extRadius*Math.cos(extTheta)*Math.cos(extPhi)
);
camera.lookAt(extTarget);

let dragging=false, lastX=0, lastY=0;
canvas.addEventListener('mousedown',e=>{if(mode==='ext'){dragging=true;lastX=e.clientX;lastY=e.clientY;}});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('mousemove',e=>{
  if(!dragging||mode!=='ext')return;
  extTheta-=(e.clientX-lastX)*0.008;
  extPhi=Math.max(0.08,Math.min(1.45,extPhi-(e.clientY-lastY)*0.006));
  lastX=e.clientX; lastY=e.clientY;
});
canvas.addEventListener('wheel',e=>{
  if(mode==='ext') extRadius=Math.max(6,Math.min(70,extRadius+e.deltaY*0.04));
},{passive:true});

let pinchDist=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&dragging&&mode==='ext'){
    extTheta-=(e.touches[0].clientX-lastX)*0.008;
    extPhi=Math.max(0.08,Math.min(1.45,extPhi-(e.touches[0].clientY-lastY)*0.006));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    extRadius=Math.max(6,Math.min(70,extRadius-(d-pinchDist)*0.05));
    pinchDist=d;
  }
},{passive:true});
canvas.addEventListener('touchend',()=>dragging=false,{passive:true});

// ─────────────────────────────────────────
const intPos=new THREE.Vector3(0,1.65,-2.0);
let intYaw=0, intPitch=0;
const keys={};
window.addEventListener('keydown',e=>keys[e.code]=true);
window.addEventListener('keyup',e=>keys[e.code]=false);

let pointerLocked=false;
canvas.addEventListener('click',()=>{ if(mode==='int') canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ pointerLocked=document.pointerLockElement===canvas; });
document.addEventListener('mousemove',e=>{
  if(!pointerLocked||mode!=='int')return;
  intYaw  -=e.movementX*0.002;
  intPitch=Math.max(-1.0,Math.min(1.0,intPitch-e.movementY*0.002));
});

// Zonas de label (baseado em posição X/Z)
function getRoomLabel(x,z){
  // Jardim de inverno (centro)
  if(x>=-1.9&&x<=1.9&&z>=0.1&&z<=3.9) return '🌿 Jardim de Inverno';
  // Varanda
  if(z<=-3.0&&z>=-5.2) return '🏡 Varanda';
  // Suíte
  if(x>=1.8&&z<0.2&&z>=-3.0) return '🛏 Suíte Master';
  // Qto2
  if(x<=-1.8&&z<0.2&&z>=-3.0) return '🛏 Quarto 2';
  // Sala
  if(x<=-1.8&&z>=3.8&&z<=7.2) return '🛋 Sala de Estar';
  // Cozinha
  if(x>=1.8&&z>=3.8&&z<=7.2) return '🍳 Cozinha + Jantar';
  // Piscina/deck
  if(z>=8.0&&x<=-0.2) return '🏊 Piscina + Deck';
  // Quintal
  if(z>=8.0&&x>=0) return '🌳 Quintal + Churrasco';
  return '';
}

const roomLabel=document.getElementById('room-label');
let lastZone='';
function updateRoomLabel(x,z){
  const lbl=getRoomLabel(x,z);
  if(lbl!==lastZone){
    roomLabel.textContent=lbl;
    roomLabel.classList.toggle('show',!!lbl);
    lastZone=lbl;
  }
}

// ═══════════════════════════════════════
// TOUR VIRTUAL
// ═══════════════════════════════════════
let tourActive=false;
let tourInterval=null;
let currentTourStep=0;

const tourPoints=[
  {pos:[0,1.7,-4.2], yaw:0, pitch:0, label:'🏡 Varanda - Entrada', hold:80},
  {pos:[0,1.7,-3.5], yaw:Math.PI, pitch:0.05, label:'🏠 Fachada Norte', hold:70},
  {pos:[0,1.65,0.5], yaw:0, pitch:-0.05, label:'🌿 Jardim de Inverno', hold:100},
  {pos:[0.5,1.6,1.0], yaw:0.3, pitch:-0.1, label:'🪴 Plantas Tropicais', hold:70},
  {pos:[0,1.55,1.5], yaw:0, pitch:-0.15, label:'💤 Área de Descanso', hold:60},
  {pos:[3.0,1.65,-1.5], yaw:-0.4, pitch:0, label:'🛏 Suíte Master', hold:80},
  {pos:[3.5,1.6,-1.8], yaw:Math.PI, pitch:-0.05, label:'🛏 Cama de Casal', hold:60},
  {pos:[4.3,1.65,-2.2], yaw:0.5, pitch:0, label:'🚿 Banheiro Suíte', hold:60},
  {pos:[-3.0,1.65,-1.5], yaw:0.4, pitch:0, label:'🛏 Quarto 2', hold:80},
  {pos:[-3.5,1.6,-1.8], yaw:Math.PI, pitch:-0.05, label:'🛏 Cama Solteiro', hold:60},
  {pos:[-4.4,1.65,-0.5], yaw:-0.3, pitch:0, label:'💻 Área de Estudo', hold:60},
  {pos:[-3.0,1.65,5.0], yaw:0, pitch:0, label:'🛋 Sala de Estar', hold:80},

];

function lerp(a,b,t){ return a+(b-a)*t; }
function smoothStep(t){ return t*t*(3-2*t); }

function startTour(){
  tourActive=!tourActive;
  const btn=document.getElementById('btn-tour');
  
  if(tourActive){
    setMode('int');
    btn.textContent='⏹ Parar Tour';
    btn.classList.add('active');
    currentTourStep=0;
    
    if(pointerLocked) document.exitPointerLock();
    
    const pt=tourPoints[0];
    intPos.set(...pt.pos);
    intYaw=pt.yaw;
    intPitch=pt.pitch;
    
    runTourStep();
  } else {
    btn.textContent='▶ Tour Virtual';
    btn.classList.remove('active');
    if(tourInterval) clearTimeout(tourInterval);
    tourInterval=null;
  }
}

function runTourStep(){
  if(!tourActive) return;
  
  const pt=tourPoints[currentTourStep];
  const targetPos=new THREE.Vector3(...pt.pos);
  const targetYaw=pt.yaw;
  const targetPitch=pt.pitch;
  const duration=2500;
  const startTime=Date.now();
  const startPos=intPos.clone();
  const startYaw=intYaw;
  const startPitch=intPitch;
  
  roomLabel.textContent=pt.label;
  roomLabel.classList.add('show');
  
  function animateTour(){
    if(!tourActive) return;
    
    const elapsed=Date.now()-startTime;
    const progress=Math.min(elapsed/duration, 1);
    const smooth=smoothStep(progress);
    
    intPos.x=lerp(startPos.x, targetPos.x, smooth);
    intPos.y=lerp(startPos.y, targetPos.y, smooth);
    intPos.z=lerp(startPos.z, targetPos.z, smooth);
    
    let yawDiff=targetYaw-startYaw;
    while(yawDiff>Math.PI) yawDiff-=Math.PI*2;
    while(yawDiff<-Math.PI) yawDiff+=Math.PI*2;
    intYaw=startYaw+yawDiff*smooth;
    intPitch=lerp(startPitch, targetPitch, smooth);
    
    if(progress<1){
      requestAnimationFrame(animateTour);
    } else {
      tourInterval=setTimeout(()=>{
        if(!tourActive) return;
        currentTourStep=(currentTourStep+1)%tourPoints.length;
        runTourStep();
      }, pt.hold*16);
    }
  }
  
  animateTour();
}

function setMode(m){
  mode=m;
  const hint=document.getElementById('hint');
  if(m==='int'){
    intPos.set(0,1.65,-2.0); intYaw=Math.PI; intPitch=0;
    roomLabel.classList.remove('show');
  } else {
    if(pointerLocked) document.exitPointerLock();
  }
}

// ─────────────────────────────────────────
// LOOP
// ─────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);

  if(mode==='ext'){
    camera.position.set(
      extTarget.x+extRadius*Math.sin(extTheta)*Math.cos(extPhi),
      extTarget.y+extRadius*Math.sin(extPhi),
      extTarget.z+extRadius*Math.cos(extTheta)*Math.cos(extPhi)
    );
    camera.lookAt(extTarget);
  } else {
    const speed=4.5;
    const fwd=new THREE.Vector3(-Math.sin(intYaw),0,-Math.cos(intYaw));
    const right=new THREE.Vector3(Math.cos(intYaw),0,-Math.sin(intYaw));
    if(keys['KeyW']||keys['ArrowUp'])    intPos.addScaledVector(fwd,speed*dt);
    if(keys['KeyS']||keys['ArrowDown'])  intPos.addScaledVector(fwd,-speed*dt);
    if(keys['KeyA']||keys['ArrowLeft'])  intPos.addScaledVector(right,-speed*dt);
    if(keys['KeyD']||keys['ArrowRight']) intPos.addScaledVector(right,speed*dt);
    if(keys['KeyQ']) intPos.y+=speed*0.4*dt;
    if(keys['KeyE']) intPos.y=Math.max(0.5,intPos.y-speed*0.4*dt);
    intPos.x=Math.max(-4.8,Math.min(4.8,intPos.x));
    intPos.z=Math.max(-5.0,Math.min(15.0,intPos.z));
    intPos.y=Math.max(0.5,Math.min(4.0,intPos.y));

    camera.position.copy(intPos);
    const lookDir=new THREE.Vector3(
      -Math.sin(intYaw)*Math.cos(intPitch),
      Math.sin(intPitch),
      -Math.cos(intYaw)*Math.cos(intPitch)
    );
    camera.lookAt(intPos.clone().add(lookDir));
    updateRoomLabel(intPos.x, intPos.z);
  }

  // Animar água
  if(M.water.map) M.water.map.offset.x+=dt*0.018;
  // Luz jardim pulsa suavemente (luz natural filtrada)
  jardimLight.intensity = 0.6 + Math.sin(Date.now()*0.001)*0.08;

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

animate();
</script>
